services:
  mongo:
    image: mongo:7
    container_name: intermediate-mongo
    restart: unless-stopped
    ports:
      - '27017:27017'
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USERNAME:-root}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASSWORD:-rootpass}
      MONGO_INITDB_DATABASE: ${MONGO_DB_NAME:-productsdb}
      MONGODB_URI: ${MONGODB_URI:-mongodb://root:rootpass@localhost:27017/productsdb?authSource=admin}
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ['CMD-SHELL', 'mongosh --quiet "$${MONGODB_URI}" --eval "db.runCommand({ ping: 1 })"']
      interval: 10s
      timeout: 5s
      retries: 10

  gemma-2b:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: intermediate-gemma-2b
    restart: unless-stopped
    command:
      - "-hf"
      - "bartowski/gemma-2-2b-it-GGUF:Q4_K_M"
      - "--host"
      - "0.0.0.0"
      - "--port"
      - "8082"
      - "-c"
      - "4096"
    ports:
      - "8082:8082"
    volumes:
      - llama_cache:/root/.cache/llama.cpp

volumes:
  mongo_data:
  llama_cache:
